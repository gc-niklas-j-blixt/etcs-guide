<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ETCS Första Hjälpen</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <header>
      <img
        src="assets/images/Green Cargo Logo.svg"
        class="logo"
        alt="Green Cargo logotyp"
      />
      <h1>ETCS Första Hjälpen</h1>
    </header>

    <div id="breadcrumbs" class="breadcrumbs"></div>

    <main>
      <!-- Titel för varje steg -->
      <h2 id="title"></h2>

      <!-- Visar bilder om steg använder det -->
      <div id="image"></div>

      <!-- Brödtext / instruktion -->
      <div id="text"></div>

      <!-- Dynamiskt genererade valknappar -->
      <div id="choices"></div>

      <!-- Gå tillbaka-knapp -->
      <button id="back">Tillbaka</button>
      <button id="home">Start</button>
    </main>

    <footer>
      Version <span id="app-version">—</span> &nbsp;•&nbsp; Uppdaterad
      <span id="app-build-date">—</span>
      &nbsp;—&nbsp; Byggd av
      <a href="mailto:niklas.blixt2@greencargo.com">Niklas Blixt</a>
    </footer>

    <!-- Scripts -->
    <script src="js/guide.js"></script>
    <script src="js/validate.js"></script>
    <script src="js/version.js"></script>
    <script src="js/engine.js"></script>
  </body>
</html>
